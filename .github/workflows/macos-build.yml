name: macOS build
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies at root
        run: npm ci
      - name: Install dependencies in app
        run: cd app && npm ci
      - name: Build sidecar server
        run: npm run build:sidecar:server
      - name: Copy dist-server
        run: mkdir -p app/src-tauri/resources && cp -R dist-server app/src-tauri/resources/server
      - name: Build Tauri app
        run: cd app && npx tauri build --debug
        # env:
        #   APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        #   APPLE_ID: ${{ secrets.APPLE_ID }}
        #   TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibeops-macos
          path: app/src-tauri/target/debug/bundle
